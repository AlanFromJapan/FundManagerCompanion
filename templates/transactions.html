{% extends 'base.html' %}

{% block title %}Transactions history{% endblock %}

{% block content %}
<div class="visual-frame">
    <table class="noborder" style="width:100%; ">
        <tr>
            <td>
                <a href="/transactions/register">Register fund transaction 💸</a>
            </td>
            <td style="text-align:right;">
                <form method="post" action="/transactions/csvimportMonex" enctype="multipart/form-data" id="csv-import-form">
                    <input type="file" id="csv_file" name="csv_file" accept=".csv"
                        style="display:none"
                        onchange="document.getElementById('csv-import-form').submit()">
                    <label for="csv_file" style="cursor:pointer">Import CSV (Monex) <img src="/images/ico_monex.ico" alt="Monex Icon" /></label>
                </form>
            </td>
        </tr>
    </table>


</div>
<h1>Transactions</h1>

{% if transactions %}
    {{ xact_table(transactions, {'show_fund': True}) }}
{% else %}
    No transactions available.
{% endif %}

{% endblock %}
